<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SOC Dashboard — Login</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="auth.css" />
</head>
<body class="auth-body">

  <div class="auth-bg">
    <div class="grid-overlay"></div>
    <div class="glow glow-1"></div>
    <div class="glow glow-2"></div>
  </div>

  <div class="auth-wrap">

    <div class="auth-brand">
      <span class="auth-shield">🛡️</span>
      <div>
        <div class="auth-brand-title">AWS SOC Dashboard</div>
        <div class="auth-brand-sub">Real-Time Threat Monitoring System</div>
      </div>
    </div>

    <div class="auth-card">
      <div class="auth-card-header">
        <h2 class="auth-title">Welcome back</h2>
        <p class="auth-subtitle">Sign in to your SOC account</p>
      </div>

      <div class="auth-error" id="authError"></div>

      <form class="auth-form" id="loginForm" autocomplete="off">
        <div class="field-group">
          <label class="field-label" for="loginEmail">Email address</label>
          <div class="field-wrap">
            <span class="field-icon">✉</span>
            <input class="field-input" id="loginEmail" type="email" placeholder="analyst@soc.io" required />
          </div>
        </div>

        <div class="field-group">
          <label class="field-label" for="loginPassword">Password</label>
          <div class="field-wrap">
            <span class="field-icon">🔒</span>
            <input class="field-input" id="loginPassword" type="password" placeholder="••••••••" required />
            <button type="button" class="toggle-pw" id="togglePw" tabindex="-1">👁</button>
          </div>
        </div>

        <button class="auth-btn" type="submit" id="loginBtn">
          <span class="btn-text">Sign In</span>
          <span class="btn-loader" id="loginLoader"></span>
        </button>
      </form>

      <div class="auth-divider"><span>or</span></div>

      <p class="auth-switch">
        Don't have an account?
        <a href="signup.html" class="auth-link">Create one</a>
      </p>
    </div>

    <p class="auth-footer">Secured · AWS CloudTrail · Athena</p>
  </div>

  <script src="auth.js"></script>
</body>
</html>
